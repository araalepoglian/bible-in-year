<title>Through the Bible — Read the Bible in One Year</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f1e9;--card:#faf8f4;
  --fg:#1c1712;--fg2:#4a4238;--fg3:#8c8278;
  --accent:#9e5a2a;--accent2:#c47a3a;--accent-glow:rgba(158,90,42,0.2);
  --border:rgba(28,23,18,0.08);--border2:rgba(28,23,18,0.14);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,-apple-system,sans-serif;
  --radius:14px;--radius-sm:10px;
}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--fg);font-family:var(--sans);min-height:100vh;min-height:100dvh;overflow-x:hidden}

/* BG */
.bg-wash{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 25% 0%,rgba(158,90,42,.04) 0%,transparent 55%),
             radial-gradient(ellipse at 75% 100%,rgba(196,122,58,.03) 0%,transparent 50%)}

/* HEADER */
.header{position:relative;z-index:1;text-align:center;padding:44px 20px 16px}
.header-icon{width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  box-shadow:0 4px 20px var(--accent-glow)}
.header h1{font-family:var(--serif);font-size:28px;font-weight:500;letter-spacing:.01em;line-height:1.15}
.header p{font-size:11.5px;color:var(--fg3);letter-spacing:.14em;text-transform:uppercase;margin-top:5px}

/* MONTH TABS */
.month-bar{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--border)}
.month-scroll{display:flex;gap:3px;overflow-x:auto;padding:10px 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.month-scroll::-webkit-scrollbar{display:none}
.mo{flex-shrink:0;scroll-snap-align:center;padding:7px 15px;border-radius:100px;border:1.5px solid transparent;
  background:0;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--fg3);cursor:pointer;
  transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.mo:hover{color:var(--fg2);background:rgba(158,90,42,.06)}
.mo.active{background:var(--accent)!important;color:#fff!important;border-color:var(--accent);font-weight:600}
.mo.current:not(.active){border-color:var(--accent);color:var(--accent)}

.section-title{position:relative;z-index:1;font-family:var(--serif);font-size:22px;font-weight:500;text-align:center;padding:18px 20px 2px}

/* DAY GRID */
.grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:14px;max-width:860px;margin:0 auto}
@media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:720px){.grid{grid-template-columns:repeat(4,1fr);gap:8px;padding:16px}}

.day{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:13px 12px;text-align:left;cursor:pointer;font-family:var(--sans);color:var(--fg);
  transition:all .18s;min-height:76px;display:flex;flex-direction:column;
  -webkit-tap-highlight-color:transparent;position:relative}
.day:hover{border-color:rgba(158,90,42,.22);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.05)}
.day:active{transform:scale(.97)}
.day.today{border-color:var(--accent)!important;
  background:linear-gradient(140deg,rgba(158,90,42,.06),rgba(196,122,58,.03));
  box-shadow:0 0 0 3px var(--accent-glow),0 4px 16px rgba(158,90,42,.08)}
.day-top{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.day-n{font-size:20px;font-weight:600;font-family:var(--serif)}
.day.today .day-n{color:var(--accent)}
.today-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.day-r{font-size:10.5px;line-height:1.4;color:var(--fg3);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.footer{position:relative;z-index:1;text-align:center;font-size:10.5px;color:var(--fg3);
  padding:28px 20px 32px;border-top:1px solid var(--border);max-width:860px;margin:36px auto 0;line-height:1.7}
.footer a{color:var(--accent);text-decoration:none}

/* READING VIEW */
.rv{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);will-change:transform;overflow:hidden}
.rv.open{transform:translateX(0)}

.rv-head{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);
  padding:max(env(safe-area-inset-top,12px),12px) 16px 14px}
.rv-back{display:flex;align-items:center;gap:3px;background:0;border:0;
  font-family:var(--sans);font-size:14px;color:var(--accent);cursor:pointer;padding:4px 0;margin-bottom:6px;
  -webkit-tap-highlight-color:transparent}
.rv-badge{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;
  color:#fff;background:var(--accent);padding:2px 10px;border-radius:100px;margin-bottom:5px}
.rv-head h2{font-family:var(--serif);font-size:26px;font-weight:500;margin:0 0 3px}
.rv-head .summary{font-size:13px;color:var(--fg3);line-height:1.4}

.rv-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 32px}
.rv-body::-webkit-scrollbar{width:4px}
.rv-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.book-group{margin-bottom:20px}
.book-label{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--accent);margin-bottom:8px;padding-left:2px}

.ch{border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;overflow:hidden;background:var(--card);transition:border-color .2s}
.ch.open{border-color:rgba(158,90,42,.18)}
.ch-btn{width:100%;display:flex;justify-content:space-between;align-items:center;padding:13px 14px;
  background:0;border:0;font-family:var(--sans);font-size:15px;font-weight:500;color:var(--fg);
  cursor:pointer;-webkit-tap-highlight-color:transparent}
.ch-btn svg{transition:transform .25s;color:var(--fg3);flex-shrink:0}
.ch.open .ch-btn svg{transform:rotate(180deg);color:var(--accent)}

.ch-content{padding:0 14px 16px;animation:fadeIn .3s ease}
.ch-loading{display:flex;align-items:center;gap:10px;padding:14px;font-size:13px;color:var(--fg3)}
.spinner{width:18px;height:18px;border-radius:50%;border:2.5px solid var(--border);
  border-top-color:var(--accent);animation:spin .7s linear infinite;flex-shrink:0}

/* Verse rendering */
.v-text{font-family:var(--serif);font-size:18px;line-height:1.8;color:var(--fg)}
.v-text .heading{font-size:15px;font-weight:600;font-family:var(--sans);color:var(--accent);margin:18px 0 6px;display:block}
.v-text .heading:first-child{margin-top:0}
.v-text .vn{font-size:11px;font-weight:700;color:var(--accent);vertical-align:super;margin-right:2px;font-family:var(--sans);line-height:0}
.v-text .poem1{margin-left:16px;display:block}
.v-text .poem2{margin-left:32px;display:block}
.v-text .lb{display:block;height:8px}

.rv-nav{flex-shrink:0;display:flex;justify-content:space-between;padding:10px 16px;
  background:var(--bg);border-top:1px solid var(--border);
  padding-bottom:max(env(safe-area-inset-bottom,10px),10px)}
.rv-nav button{display:flex;align-items:center;gap:4px;background:0;border:0;
  font-family:var(--sans);font-size:13px;color:var(--accent);cursor:pointer;padding:8px 4px;
  -webkit-tap-highlight-color:transparent}
.rv-nav button:disabled{color:var(--fg3);opacity:.35;cursor:default}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

/* ─── STATE ─── */
const now=new Date(),TM=now.getMonth(),TD=now.getDate();
let curMonth=TM,curDay=null,openKey=null;
const cache={};

/* ─── PARSE ─── */
function parseReading(s){
  return s.split(";").map(x=>x.trim()).map(seg=>{
    const m=seg.match(/^(\d?\s?[A-Za-z]+)\s+(.+)$/);
    if(!m)return null;
    const ab=m[1].trim(),info=B[ab];
    if(!info)return null;
    return{ab,full:info[0],code:info[1],ch:m[2].trim()};
  }).filter(Boolean);
}

function expandCh(code,full,ch){
  const m=ch.match(/^(\d+)-(\d+)$/);
  if(m){const o=[];for(let c=+m[1];c<=+m[2];c++)o.push({label:`${full} ${c}`,code,num:c});return o;}
  return[{label:`${full} ${ch}`,code,num:+ch}];
}

/* ─── RENDER VERSE JSON → HTML ─── */
function renderContent(content){
  let html='';
  for(const item of content){
    if(item.type==='heading'){
      html+=`<span class="heading">${item.content.join('')}</span>`;
    } else if(item.type==='verse'){
      html+=`<span class="vn">${item.number} </span>`;
      for(const part of item.content){
        if(typeof part==='string'){html+=part;}
        else if(part.text){
          if(part.poem===1)html+=`<span class="poem1">${part.text}</span>`;
          else if(part.poem===2)html+=`<span class="poem2">${part.text}</span>`;
          else html+=part.text;
        }
        else if(part.lineBreak)html+='<br>';
        // skip noteId
      }
      html+=' ';
    } else if(item.type==='line_break'){
      html+='<span class="lb"></span>';
    }
  }
  return html;
}

/* ─── FETCH ─── */
async function fetchChapter(code,num){
  const key=`${code}/${num}`;
  if(cache[key])return cache[key];
  try{
    const r=await fetch(`https://bible.helloao.org/api/BSB/${code}/${num}.json`);
    const d=await r.json();
    if(d.chapter&&d.chapter.content){
      const html=renderContent(d.chapter.content);
      cache[key]=html;
      return html;
    }
    return '<span style="color:var(--fg3)">Passage not found.</span>';
  }catch{
    return '<span style="color:var(--fg3)">Network error — please check your connection.</span>';
  }
}

/* ═══ CALENDAR ═══ */
function renderMonths(){
  const el=document.getElementById("monthScroll");
  el.innerHTML=MO.map((m,i)=>{
    const cls=["mo"];if(i===curMonth)cls.push("active");if(i===TM)cls.push("current");
    return`<button class="${cls.join(" ")}" data-m="${i}">${m.slice(0,3)}</button>`;
  }).join("");
  el.querySelectorAll("button").forEach(b=>b.onclick=()=>{curMonth=+b.dataset.m;render();
    const a=el.querySelector(".active");if(a)a.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
  });
  requestAnimationFrame(()=>{const a=el.querySelector(".active");if(a)a.scrollIntoView({behavior:"auto",inline:"center",block:"nearest"});});
}

function renderGrid(){
  const el=document.getElementById("dayGrid"),dc=DIM[curMonth];
  el.innerHTML=Array.from({length:dc},(_,i)=>i+1).map(d=>{
    const r=P[curMonth]?.[d]||"",it=curMonth===TM&&d===TD;
    return`<button class="day${it?" today":""}" data-d="${d}" id="d-${curMonth}-${d}">
      <div class="day-top"><span class="day-n">${d}</span>${it?'<span class="today-dot"></span>':''}</div>
      <div class="day-r">${r}</div>
    </button>`;
  }).join("");
  el.querySelectorAll(".day").forEach(b=>b.onclick=()=>openDay(+b.dataset.d));
}

function render(){renderMonths();document.getElementById("sectionTitle").textContent=MO[curMonth];renderGrid();}

/* ═══ READING VIEW ═══ */
async function toggleCh(key,code,num){
  const el=document.getElementById("ch-"+key);if(!el)return;
  if(openKey===key){el.classList.remove("open");const c=el.querySelector(".ch-content");if(c)c.remove();openKey=null;return;}
  if(openKey!==null){const prev=document.getElementById("ch-"+openKey);if(prev){prev.classList.remove("open");const c=prev.querySelector(".ch-content");if(c)c.remove();}}
  openKey=key;el.classList.add("open");
  const loader=document.createElement("div");loader.className="ch-loading";loader.innerHTML='<div class="spinner"></div><span>Loading scripture…</span>';
  const wrap=document.createElement("div");wrap.className="ch-content";wrap.appendChild(loader);el.appendChild(wrap);
  const html=await fetchChapter(code,num);
  wrap.innerHTML=`<div class="v-text">${html}</div>`;
}

function openDay(day){
  curDay=day;openKey=null;
  const str=P[curMonth]?.[day]||"",readings=parseReading(str),it=curMonth===TM&&day===TD,dc=DIM[curMonth];
  document.getElementById("rvBackLabel").textContent=MO[curMonth];
  document.getElementById("rvBadge").innerHTML=it?'<span class="rv-badge">Today</span>':'';
  document.getElementById("rvTitle").textContent=`${MO[curMonth]} ${day}`;
  document.getElementById("rvSummary").textContent=str;

  const body=document.getElementById("rvBody");
  let h='';
  let idx=0;
  readings.forEach(r=>{
    const chs=expandCh(r.code,r.full,r.ch);
    h+=`<div class="book-group"><div class="book-label">${r.full} ${r.ch}</div>`;
    chs.forEach(c=>{
      h+=`<div class="ch" id="ch-${idx}" data-k="${idx}" data-code="${c.code}" data-num="${c.num}">
        <button class="ch-btn"><span>${c.label}</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button></div>`;
      idx++;
    });
    h+=`</div>`;
  });
  body.innerHTML=h;body.scrollTop=0;

  // Auto-open first
  const first=body.querySelector(".ch");
  if(first)toggleCh(first.dataset.k,first.dataset.code,+first.dataset.num);

  body.querySelectorAll(".ch-btn").forEach(btn=>{
    const ch=btn.parentElement;
    btn.onclick=()=>toggleCh(ch.dataset.k,ch.dataset.code,+ch.dataset.num);
  });

  const prev=document.getElementById("prevDay"),next=document.getElementById("nextDay");
  prev.disabled=day<=1;next.disabled=day>=dc;
  document.getElementById("prevLabel").textContent=day>1?`Day ${day-1}`:'';
  document.getElementById("nextLabel").textContent=day<dc?`Day ${day+1}`:'';
  document.getElementById("rv").classList.add("open");
}

function closeRV(){document.getElementById("rv").classList.remove("open");curDay=null;openKey=null;}

/* ─── EVENTS ─── */
document.getElementById("rvBack").onclick=closeRV;
document.getElementById("prevDay").onclick=()=>{if(curDay>1)openDay(curDay-1);};
document.getElementById("nextDay").onclick=()=>{if(curDay<DIM[curMonth])openDay(curDay+1);};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeRV();});

/* ─── INIT ─── */
render();
setTimeout(()=>{const t=document.getElementById(`d-${TM}-${TD}`);if(t)t.scrollIntoView({behavior:"smooth",block:"center"});},300);
</script>
